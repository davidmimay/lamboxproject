<ng-container *ngIf="posts?.lenght > 0 | async as posts; else loading">
  <mat-card class="border" *ngFor="let item of posts" [routerLink]="['post', item.id]">
    <h1>{{ item.titlePost }}</h1>
    <mat-card-header>
      <mat-card-title>{{ item.titlePost }}</mat-card-title>
      <mat-chip-listbox>
        <mat-chip color="primary" *ngFor="let tag of item.tagsPost" [ngClass]="tag">{{ tag }}</mat-chip>
      </mat-chip-listbox>
      <mat-card-subtitle>10 minutes ago</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>{{ item.contentPost |  slice:0:100 }}...</p>    
    </mat-card-content> 

    <img class="filter" matPostImage [src]="item.imagePost" />
      
    <mat-card-actions>
      <button mat-button><mat-icon>bookmark</mat-icon></button>
    </mat-card-actions>
  </mat-card>
</ng-container>

<ng-template #loading>
  <mat-spinner class="spinner"></mat-spinner>
</ng-template>
