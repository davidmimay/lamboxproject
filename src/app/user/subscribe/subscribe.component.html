<main>
  <h3>Google Calendar + Firebase</h3>
  <p>Welcome to AngularFirebase world </p>

  <div *ngIf="auth.user$ | async as user">
      <h3>Logged in as {{ user.displayName }}</h3>
      <img src="{{ user.photoURL }}" width="50px">
  </div>


  <button mat-raised-button (click)="auth.login()" class="button is-danger">Read Youtube Subscription</button>

  <button mat-raised-button (click)="auth.logout()" class="button">Logout</button>

  <hr>

  <div *ngIf="auth.user$ | async">
    <h2>Subscribe to unlock features</h2>
      <button mat-raised-button (click)="auth.getYoutuber()" class="button is-success">Get Subscriber Status</button>
      <div *ngIf="auth.youtubeItems?.length > 0; else loading">

        <h2>Subscribed</h2>
        <div *ngFor="let item of auth.youtubeItems">
          <h2>{{item.snippet.title}}</h2>
          <img [src]="item.snippet.thumbnails.default.url">
          <h3>{{item.snippet.description}}</h3>
        </div>
      </div>

      <ng-template #loading>
        <p>You are not subscribed yet </p>
        <a mat-raised-button href="http://www.youtube.com/channel/UCt3hkamH765L19U3inGFzfg?sub_confirmation=1" target="_blank">Subscribe</a>
        <mat-spinner class="spinner"></mat-spinner>
      </ng-template>

      <!--
      <button mat-raised-button (click)="auth.getCalendar()" class="button is-success">Get Google Calendar</button>
      <button mat-raised-button (click)="auth.insertEvent()" class="button is-warning">Add Event</button>

      <div *ngFor="let item of auth.calendarItems">
          <h3>{{ item.summary }} - {{ item.status }}</h3>
          <p><em>Created {{ item.created }}</em></p>
          <p>{{ item.description }}</p>
          <hr>
      </div>
      -->

  </div>

</main>
